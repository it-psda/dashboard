<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPT PSDA - Smart Database & Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #1e293b; margin: 0; }
        
        .auth-card { display: none; width: 100%; max-width: 500px; }
        .auth-card.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: white; border-right: 1px solid #e2e8f0; z-index: 50; transition: transform 0.3s ease; }
        .main-wrapper { transition: margin-left 0.3s; }
        
        @media (min-width: 1024px) { .main-wrapper { margin-left: 280px; } }
        @media (max-width: 1023px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-wrapper { margin-left: 0; padding-bottom: 80px; }
        }

        .input-group { position: relative; margin-bottom: 0.75rem; }
        .input-group i { position: absolute; left: 1rem; top: 0.85rem; width: 1.1rem; height: 1.1rem; color: #64748b; }
        .input-group input, .input-group select { width: 100%; padding: 0.75rem 1rem 0.75rem 2.8rem; background: #fff; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-size: 0.875rem; transition: all 0.2s; }
        .input-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        .photo-upload { position: relative; width: 100px; height: 100px; border-radius: 2rem; border: 2px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; background: #f1f5f9; transition: all 0.2s; }
        .photo-upload:hover { border-color: var(--primary); background: #eff6ff; }
        
        .nav-btn.active { background: #eff6ff; color: #2563eb; }
        .page { animation: fadeIn 0.3s ease-in-out; }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Splash Screen -->
    <div id="splash" class="fixed inset-0 z-[9999] bg-white flex flex-col items-center justify-center transition-opacity duration-500">
        <img src="https://lh3.googleusercontent.com/d/1jMrmCABKhr0PWxsEap_Y8zO0WV7kUXOx" class="w-20 h-20 mb-4 animate-bounce">
        <div class="flex flex-col items-center">
            <p class="text-slate-400 font-bold tracking-widest text-[10px] uppercase">UPT PSDA Cloud System</p>
            <div class="w-32 h-1 bg-slate-100 rounded-full mt-2 overflow-hidden">
                <div class="w-full h-full bg-blue-600 animate-[loading_1.5s_infinite]"></div>
            </div>
        </div>
    </div>

    <!-- UI Autentikasi -->
    <div id="page-auth" class="hidden fixed inset-0 z-[500] flex items-center justify-center p-4 bg-slate-50 overflow-y-auto">
        <!-- Login Card -->
        <div id="card-login" class="auth-card active bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
            <div class="text-center mb-8">
                <img src="https://lh3.googleusercontent.com/d/1jMrmCABKhr0PWxsEap_Y8zO0WV7kUXOx" class="w-14 h-14 mx-auto mb-4">
                <h2 class="text-2xl font-bold text-slate-900">UPT PSDA Login</h2>
                <p class="text-slate-500 text-sm mt-1">Gunakan ID Pegawai & Password</p>
            </div>
            <div class="space-y-4">
                <div class="input-group"><i data-lucide="user"></i><input type="text" id="login-id" placeholder="ID Pegawai (Contoh: PSDA-...)"></div>
                <div class="input-group"><i data-lucide="lock"></i><input type="password" id="login-pass" placeholder="Password"></div>
                <button id="btn-login" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="log-in" class="w-4 h-4"></i> Masuk Sekarang
                </button>
                <p class="text-center text-slate-500 text-sm mt-6">
                    Belum punya akun? <button id="to-register" class="text-blue-600 font-bold underline underline-offset-4">Daftar Pegawai</button>
                </p>
            </div>
        </div>

        <!-- Register Card -->
        <div id="card-register" class="auth-card bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100 my-10 max-w-2xl">
            <div class="mb-6 flex justify-between items-start">
                <div>
                    <h2 class="text-2xl font-bold text-slate-900">Registrasi Pegawai</h2>
                    <p class="text-slate-400 text-sm">Lengkapi data profil cloud Anda</p>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <label class="photo-upload" for="photo-input">
                        <div id="photo-placeholder" class="text-slate-400 flex flex-col items-center text-center">
                            <i data-lucide="camera" class="w-6 h-6 mb-1"></i>
                            <span class="text-[9px] font-bold uppercase leading-tight">Upload<br>Foto</span>
                        </div>
                        <div id="photo-preview-container" class="hidden w-full h-full">
                            <img id="photo-preview" class="w-full h-full object-cover">
                        </div>
                    </label>
                    <input type="file" id="photo-input" class="hidden" accept="image/*">
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                <div class="input-group"><i data-lucide="user"></i><input type="text" id="reg-name" placeholder="Nama Lengkap"></div>
                <div class="input-group"><i data-lucide="fingerprint"></i><input type="text" id="reg-id-auto" placeholder="ID Pegawai" disabled class="bg-blue-50 font-mono text-blue-600 font-bold"></div>
                <div class="input-group"><i data-lucide="briefcase"></i>
                    <select id="reg-jabatan">
                        <option value="" disabled selected>Pilih Jabatan</option>
                        <option>Pekarya</option><option>PPA</option><option>Korlap</option><option>Staf Pengamat</option><option>Admin</option>
                    </select>
                </div>
                <div class="input-group"><i data-lucide="users"></i>
                    <select id="reg-tipe">
                        <option>Tenaga Kontrak</option><option>PPPK</option><option>PNS</option>
                    </select>
                </div>
                <div class="input-group"><i data-lucide="lock"></i><input type="password" id="reg-pass" placeholder="Password Akun"></div>
                <div class="input-group"><i data-lucide="phone"></i><input type="tel" id="reg-hp" placeholder="No WhatsApp"></div>
                <div class="input-group"><i data-lucide="map"></i><input type="text" id="reg-wilayah" placeholder="Wilayah"></div>
                <div class="input-group"><i data-lucide="droplet"></i><input type="text" id="reg-di" placeholder="Nama DI"></div>
                <div class="input-group md:col-span-2"><i data-lucide="map-pin"></i><input type="text" id="reg-lokasi" placeholder="Lokasi Penugasan Spesifik"></div>
            </div>
            <button id="btn-reg" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-lg mt-4 hover:bg-blue-700 transition-all">Simpan & Aktifkan Cloud</button>
            <button id="to-login" class="w-full text-slate-400 font-bold mt-4 text-xs uppercase tracking-widest hover:text-blue-600">Batal & Kembali Login</button>
        </div>
    </div>

    <!-- Aplikasi Utama -->
    <div id="app-main" class="hidden">
        <aside id="sidebar" class="sidebar p-6 flex flex-col">
            <div class="flex items-center justify-between mb-10 px-2">
                <div class="flex items-center gap-3">
                    <img src="https://lh3.googleusercontent.com/d/1jMrmCABKhr0PWxsEap_Y8zO0WV7kUXOx" class="w-9 h-9">
                    <span class="font-black text-xl tracking-tighter uppercase text-blue-700">UPT PSDA</span>
                </div>
                <button id="close-sidebar" class="lg:hidden p-2 text-slate-400"><i data-lucide="x"></i></button>
            </div>
            <nav class="flex-1 space-y-2">
                <button id="nav-home-btn" class="nav-btn w-full flex items-center gap-3 p-3.5 rounded-xl font-bold transition-all active"><i data-lucide="layout-dashboard"></i> Dashboard</button>
                <button id="nav-admin-btn" class="nav-btn w-full flex items-center gap-3 p-3.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all"><i data-lucide="users"></i> Database Pegawai</button>
            </nav>
            <div class="mt-auto p-4 bg-slate-50 rounded-2xl flex items-center gap-3 border border-slate-100">
                <div id="side-avatar-container" class="w-10 h-10 bg-blue-600 rounded-xl overflow-hidden flex items-center justify-center text-white font-bold shrink-0">
                    <img id="side-avatar-img" class="w-full h-full object-cover hidden">
                    <span id="side-avatar-text">?</span>
                </div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-[11px] font-bold truncate text-slate-800" id="side-user-name">...</p>
                    <div class="flex items-center gap-1">
                        <div class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div>
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Connected</p>
                    </div>
                </div>
                <button onclick="location.reload()" class="text-slate-300 hover:text-red-500"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
        </aside>

        <main class="main-wrapper min-h-screen">
            <header class="p-4 lg:px-10 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <button id="open-sidebar" class="lg:hidden p-2 bg-slate-50 rounded-lg"><i data-lucide="menu"></i></button>
                    <h2 class="text-lg font-bold text-slate-800" id="top-user-name">Memuat...</h2>
                </div>
            </header>
            <div class="p-6 lg:p-10 max-w-7xl mx-auto">
                <section id="page-home" class="page space-y-6">
                    <div class="bg-gradient-to-br from-blue-700 to-indigo-800 rounded-[2.5rem] p-8 md:p-14 text-white shadow-2xl relative overflow-hidden">
                        <div class="relative z-10">
                            <h2 class="text-3xl md:text-5xl font-black mb-4 leading-tight">Digitalisasi<br>UPT PSDA Cloud</h2>
                            <button id="btn-goto-db" class="bg-white text-blue-700 px-8 py-3 rounded-xl font-extrabold shadow-xl text-sm">Buka Database</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-white p-6 rounded-[2rem] border border-slate-100 flex items-center gap-4">
                            <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600"><i data-lucide="users" class="w-7 h-7"></i></div>
                            <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total Pegawai</p><h4 class="text-3xl font-black text-slate-800" id="stat-total">0</h4></div>
                        </div>
                    </div>
                </section>
                <section id="page-admin" class="page hidden">
                    <div id="user-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20"></div>
                </section>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5MSJbJuFDwak9k561h7nzPGcsskHE7_s",
            authDomain: "database-engine-upt-psda.firebaseapp.com",
            projectId: "database-engine-upt-psda",
            storageBucket: "database-engine-upt-psda.firebasestorage.app",
            messagingSenderId: "98861981068",
            appId: "1:98861981068:web:767f249c35a0dae4d2caa9",
            measurementId: "G-YYVH7RE5MN",
            databaseURL: "https://database-engine-upt-psda-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);
        const appId = 'upt-psda-smart';
        
        let selectedPhotoBase64 = null;

        // UI Utility Functions (Didefinisikan di dalam modul agar bisa diakses langsung)
        const hideSplash = () => {
            const s = document.getElementById('splash');
            if(s) { s.style.opacity = '0'; setTimeout(() => s.style.display = 'none', 500); }
        };

        const showAuth = () => {
            document.getElementById('page-auth').classList.remove('hidden');
            document.getElementById('app-main').classList.add('hidden');
            lucide.createIcons();
        };

        const showApp = (data) => {
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('app-main').classList.remove('hidden');
            document.getElementById('top-user-name').innerText = `Halo, ${data.Nama_Lengkap.split(' ')[0]}!`;
            document.getElementById('side-user-name').innerText = data.Nama_Lengkap;
            
            const avatarImg = document.getElementById('side-avatar-img');
            const avatarTxt = document.getElementById('side-avatar-text');
            if(data.Foto_Profil) {
                avatarImg.src = data.Foto_Profil;
                avatarImg.classList.remove('hidden');
                avatarTxt.classList.add('hidden');
            } else {
                avatarTxt.innerText = data.Nama_Lengkap.charAt(0);
                avatarTxt.classList.remove('hidden');
            }
            loadDatabase();
            lucide.createIcons();
        };

        const loadDatabase = () => {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'all_users');
            onSnapshot(q, (snap) => {
                const list = [];
                snap.forEach(d => list.push(d.data()));
                renderUserList(list);
            });
        };

        const renderUserList = (users) => {
            const container = document.getElementById('user-list');
            document.getElementById('stat-total').innerText = users.length;
            container.innerHTML = users.map(u => `
                <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center font-bold text-blue-600 overflow-hidden">
                            ${u.Foto_Profil ? `<img src="${u.Foto_Profil}" class="w-full h-full object-cover">` : u.Nama_Lengkap[0]}
                        </div>
                        <div><h4 class="font-bold text-slate-800">${u.Nama_Lengkap}</h4><p class="text-[10px] text-blue-600 font-bold uppercase">${u.Jabatan}</p></div>
                    </div>
                    <div class="text-[11px] space-y-1 pt-2 border-t border-slate-50">
                        <div class="flex justify-between"><span class="text-slate-400">ID</span><span class="font-mono font-bold">${u.ID_User}</span></div>
                        <div class="flex justify-between"><span class="text-slate-400">Wilayah</span><span>${u.Wilayah}</span></div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        // Event Listeners
        document.getElementById('btn-login').onclick = async () => {
            const idInput = document.getElementById('login-id').value;
            const passInput = document.getElementById('login-pass').value;
            if (!idInput || !passInput) return alert("Isi semua field!");
            
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'all_users');
            onSnapshot(q, (snap) => {
                let userFound = null;
                snap.forEach(d => {
                    const data = d.data();
                    if (data.ID_User === idInput && data.Password === passInput) userFound = data;
                });
                if (userFound) showApp(userFound);
                else alert("Login Gagal!");
            });
        };

        document.getElementById('btn-reg').onclick = async () => {
            const name = document.getElementById('reg-name').value;
            const pass = document.getElementById('reg-pass').value;
            if (!name || !pass) return alert("Nama & Pass wajib!");
            
            const payload = {
                uid: auth.currentUser.uid,
                ID_User: document.getElementById('reg-id-auto').value,
                Nama_Lengkap: name,
                Jabatan: document.getElementById('reg-jabatan').value || "Pegawai",
                Tipe_Pegawai: document.getElementById('reg-tipe').value,
                Password: pass,
                No_HP: document.getElementById('reg-hp').value,
                Wilayah: document.getElementById('reg-wilayah').value,
                Foto_Profil: selectedPhotoBase64,
                CreatedAt: new Date().toISOString()
            };

            await setDoc(doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'profile', 'data'), payload);
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'all_users', auth.currentUser.uid), payload);
            await set(push(ref(rtdb, 'user_queue')), payload);
            showApp(payload);
        };

        document.getElementById('photo-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                selectedPhotoBase64 = ev.target.result;
                document.getElementById('photo-preview').src = selectedPhotoBase64;
                document.getElementById('photo-preview-container').classList.remove('hidden');
                document.getElementById('photo-placeholder').classList.add('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('reg-name').onkeyup = (e) => {
            const val = e.target.value;
            if(val.length > 2) {
                const init = val.split(' ').map(n => n[0]).join('').toUpperCase().substring(0,3);
                document.getElementById('reg-id-auto').value = `PSDA-${init}-${Math.floor(1000+Math.random()*9000)}`;
            }
        };

        // Navigation
        const nav = (p) => {
            document.querySelectorAll('.page').forEach(s => s.classList.add('hidden'));
            document.getElementById('page-' + p).classList.remove('hidden');
            lucide.createIcons();
        };

        document.getElementById('nav-home-btn').onclick = () => nav('home');
        document.getElementById('nav-admin-btn').onclick = () => nav('admin');
        document.getElementById('btn-goto-db').onclick = () => nav('admin');
        document.getElementById('to-register').onclick = () => { document.getElementById('card-login').classList.remove('active'); document.getElementById('card-register').classList.add('active'); };
        document.getElementById('to-login').onclick = () => { document.getElementById('card-register').classList.remove('active'); document.getElementById('card-login').classList.add('active'); };
        document.getElementById('open-sidebar').onclick = () => document.getElementById('sidebar').classList.add('open');
        document.getElementById('close-sidebar').onclick = () => document.getElementById('sidebar').classList.remove('open');

        // Init App
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
                if (snap.exists()) showApp(snap.data());
                else showAuth();
            } else {
                signInAnonymously(auth);
            }
            hideSplash();
        });

        lucide.createIcons();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPT PSDA - Smart Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #1e293b; margin: 0; }
        
        .auth-card { display: none; width: 100%; max-width: 450px; }
        .auth-card.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: white; border-right: 1px solid #e2e8f0; z-index: 50; transition: transform 0.3s ease; }
        .main-wrapper { transition: margin-left 0.3s; }
        
        @media (min-width: 1024px) { .main-wrapper { margin-left: 280px; } }
        @media (max-width: 1023px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-wrapper { margin-left: 0; }
        }

        .input-group { position: relative; margin-bottom: 0.75rem; }
        .input-group i { position: absolute; left: 1rem; top: 0.85rem; width: 1.1rem; height: 1.1rem; color: #64748b; }
        .input-group input, .input-group select { width: 100%; padding: 0.75rem 1rem 0.75rem 2.8rem; background: #fff; border: 1px solid #e2e8f0; border-radius: 0.75rem; font-size: 0.875rem; transition: all 0.2s; }
        .input-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        .photo-upload { position: relative; width: 80px; height: 80px; border-radius: 1.5rem; border: 2px dashed #cbd5e1; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; background: #f1f5f9; }
        
        .nav-btn.active { background: #eff6ff; color: #2563eb; }
        .page { animation: fadeIn 0.3s ease-in-out; }

        #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 1000; display: none; }
    </style>
</head>
<body>

    <!-- Toast Notification -->
    <div id="toast" class="bg-slate-900 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl flex items-center gap-2">
        <i data-lucide="info" class="w-4 h-4"></i> <span id="toast-msg">Pesan</span>
    </div>

    <!-- Splash Screen -->
    <div id="splash" class="fixed inset-0 z-[9999] bg-white flex flex-col items-center justify-center">
        <img src="https://lh3.googleusercontent.com/d/1jMrmCABKhr0PWxsEap_Y8zO0WV7kUXOx" class="w-20 h-20 mb-4 animate-pulse">
        <p class="text-slate-400 font-bold tracking-widest text-[10px] uppercase">UPT PSDA Cloud System</p>
    </div>

    <!-- UI Autentikasi -->
    <div id="page-auth" class="hidden fixed inset-0 z-[500] flex items-center justify-center p-4 bg-slate-50 overflow-y-auto">
        <!-- Login Card -->
        <div id="card-login" class="auth-card active bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100">
            <div class="text-center mb-8">
                <img src="https://lh3.googleusercontent.com/d/1jMrmCABKhr0PWxsEap_Y8zO0WV7kUXOx" class="w-12 h-12 mx-auto mb-4">
                <h2 class="text-xl font-bold text-slate-900">UPT PSDA Login</h2>
                <p class="text-slate-500 text-xs mt-1">Sistem Database Terintegrasi</p>
            </div>
            <div class="space-y-3">
                <div class="input-group"><i data-lucide="user"></i><input type="text" id="login-id" placeholder="ID Pegawai (Contoh: PSDA-...)"></div>
                <div class="input-group"><i data-lucide="lock"></i><input type="password" id="login-pass" placeholder="Password"></div>
                <button id="btn-login" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                    Masuk Sekarang
                </button>
                <p class="text-center text-slate-500 text-xs mt-6">
                    Belum terdaftar? <button id="to-register" class="text-blue-600 font-bold">Klik Daftar Pegawai</button>
                </p>
            </div>
        </div>

        <!-- Register Card -->
        <div id="card-register" class="auth-card bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 my-10">
            <div class="mb-6 flex justify-between items-center">
                <h2 class="text-xl font-bold text-slate-900">Registrasi</h2>
                <label class="photo-upload" for="photo-input">
                    <div id="photo-placeholder" class="text-slate-400 text-center"><i data-lucide="camera" class="w-5 h-5 mx-auto"></i></div>
                    <img id="photo-preview" class="hidden w-full h-full object-cover">
                </label>
                <input type="file" id="photo-input" class="hidden" accept="image/*">
            </div>
            <div class="grid grid-cols-1 gap-2">
                <div class="input-group"><i data-lucide="user"></i><input type="text" id="reg-name" placeholder="Nama Lengkap"></div>
                <div class="input-group"><i data-lucide="fingerprint"></i><input type="text" id="reg-id-auto" placeholder="ID Otomatis" disabled class="bg-slate-50 font-mono"></div>
                <div class="input-group"><i data-lucide="briefcase"></i>
                    <select id="reg-jabatan">
                        <option value="" disabled selected>Pilih Jabatan</option>
                        <option>Pekarya</option><option>PPA</option><option>Korlap</option><option>Staf Pengamat</option><option>Admin</option>
                    </select>
                </div>
                <div class="input-group"><i data-lucide="lock"></i><input type="password" id="reg-pass" placeholder="Password Akun"></div>
                <div class="input-group"><i data-lucide="map"></i><input type="text" id="reg-wilayah" placeholder="Wilayah"></div>
            </div>
            <button id="btn-reg" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold mt-4 hover:bg-blue-700">Daftar Akun</button>
            <button id="to-login" class="w-full text-slate-400 font-bold mt-4 text-[10px] uppercase">Kembali Login</button>
        </div>
    </div>

    <!-- Aplikasi Utama -->
    <div id="app-main" class="hidden">
        <aside id="sidebar" class="sidebar p-6 flex flex-col">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-3">
                    <img src="https://lh3.googleusercontent.com/d/1jMrmCABKhr0PWxsEap_Y8zO0WV7kUXOx" class="w-8 h-8">
                    <span class="font-black text-lg text-blue-700">UPT PSDA</span>
                </div>
                <button id="close-sidebar" class="lg:hidden p-2 text-slate-400"><i data-lucide="x"></i></button>
            </div>
            <nav class="flex-1 space-y-1">
                <button id="nav-home-btn" class="nav-btn w-full flex items-center gap-3 p-3 rounded-xl font-bold active"><i data-lucide="layout"></i> Dashboard</button>
                <button id="nav-admin-btn" class="nav-btn w-full flex items-center gap-3 p-3 text-slate-500 rounded-xl"><i data-lucide="database"></i> Database</button>
            </nav>
            <div class="mt-auto p-4 bg-slate-50 rounded-xl flex items-center gap-3 border border-slate-100">
                <div class="w-10 h-10 bg-blue-600 rounded-lg overflow-hidden flex items-center justify-center text-white font-bold">
                    <img id="side-avatar-img" class="w-full h-full object-cover hidden">
                    <span id="side-avatar-text">?</span>
                </div>
                <div class="flex-1 overflow-hidden">
                    <p class="text-[11px] font-bold truncate" id="side-user-name">Pegawai</p>
                    <p class="text-[9px] text-green-500 font-bold uppercase">Online</p>
                </div>
                <button onclick="location.reload()" class="text-slate-300 hover:text-red-500"><i data-lucide="log-out" class="w-4 h-4"></i></button>
            </div>
        </aside>

        <main class="main-wrapper min-h-screen">
            <header class="p-4 lg:px-10 flex justify-between items-center bg-white border-b border-slate-100 sticky top-0 z-40">
                <button id="open-sidebar" class="lg:hidden p-2 bg-slate-50 rounded-lg"><i data-lucide="menu"></i></button>
                <h2 class="text-sm font-bold text-slate-800" id="top-title">Dashboard</h2>
                <div class="w-8 h-8"></div>
            </header>
            <div class="p-6 lg:p-10 max-w-6xl mx-auto">
                <section id="page-home" class="page space-y-6">
                    <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-[2rem] p-8 text-white shadow-xl">
                        <h2 class="text-2xl font-black mb-2">Selamat Datang</h2>
                        <p class="text-blue-100 text-sm opacity-80" id="welcome-msg">Memuat data profil...</p>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-white p-5 rounded-2xl border border-slate-100">
                            <p class="text-[9px] font-bold text-slate-400 uppercase">Total Pegawai</p>
                            <h4 class="text-2xl font-black text-slate-800" id="stat-total">0</h4>
                        </div>
                    </div>
                </section>
                <section id="page-admin" class="page hidden">
                    <div id="user-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                </section>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5MSJbJuFDwak9k561h7nzPGcsskHE7_s",
            authDomain: "database-engine-upt-psda.firebaseapp.com",
            projectId: "database-engine-upt-psda",
            storageBucket: "database-engine-upt-psda.firebasestorage.app",
            messagingSenderId: "98861981068",
            appId: "1:98861981068:web:767f249c35a0dae4d2caa9"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'upt-psda-smart';
        
        let selectedPhoto = null;

        // UI Helpers
        const showToast = (msg) => {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.style.display = 'flex';
            setTimeout(() => t.style.display = 'none', 3000);
        };

        const hideSplash = () => {
            const s = document.getElementById('splash');
            s.style.opacity = '0';
            setTimeout(() => s.style.display = 'none', 500);
        };

        const renderApp = (userData) => {
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('app-main').classList.remove('hidden');
            document.getElementById('side-user-name').innerText = userData.Nama_Lengkap;
            document.getElementById('welcome-msg').innerText = `ID Anda: ${userData.ID_User} | Wilayah: ${userData.Wilayah}`;
            
            if(userData.Foto_Profil) {
                document.getElementById('side-avatar-img').src = userData.Foto_Profil;
                document.getElementById('side-avatar-img').classList.remove('hidden');
                document.getElementById('side-avatar-text').classList.add('hidden');
            } else {
                document.getElementById('side-avatar-text').innerText = userData.Nama_Lengkap[0];
            }
            fetchDatabase();
        };

        const fetchDatabase = () => {
            // Path sesuai gambar console: artifacts/upt-psda-smart/public/data/all_users
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'all_users');
            onSnapshot(colRef, (snap) => {
                const users = [];
                snap.forEach(d => users.push(d.data()));
                document.getElementById('stat-total').innerText = users.length;
                
                document.getElementById('user-list').innerHTML = users.map(u => `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-3">
                        <div class="w-10 h-10 bg-slate-100 rounded-lg overflow-hidden flex items-center justify-center font-bold text-blue-600">
                            ${u.Foto_Profil ? `<img src="${u.Foto_Profil}" class="w-full h-full object-cover">` : u.Nama_Lengkap[0]}
                        </div>
                        <div class="overflow-hidden">
                            <h4 class="text-xs font-bold truncate">${u.Nama_Lengkap}</h4>
                            <p class="text-[9px] text-slate-400 font-bold uppercase">${u.Jabatan} - ${u.Wilayah}</p>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            }, (err) => {
                console.error("Firestore Listen Error:", err);
                showToast("Gagal memuat database");
            });
        };

        // Login Logic (DIPERBAIKI)
        document.getElementById('btn-login').onclick = async () => {
            const id = document.getElementById('login-id').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            
            if(!id || !pass) return showToast("Isi semua data!");

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'all_users');
                const snap = await getDocs(colRef);
                let found = null;
                
                snap.forEach(doc => {
                    const data = doc.data();
                    if(data.ID_User === id && data.Password === pass) found = data;
                });

                if(found) {
                    showToast("Login Berhasil!");
                    renderApp(found);
                } else {
                    showToast("ID atau Password salah!");
                }
            } catch (e) {
                console.error(e);
                showToast("Error sistem login");
            }
        };

        // Register Logic
        document.getElementById('btn-reg').onclick = async () => {
            const name = document.getElementById('reg-name').value;
            const pass = document.getElementById('reg-pass').value;
            if(!name || !pass) return showToast("Lengkapi form!");

            const userId = auth.currentUser.uid;
            const payload = {
                uid: userId,
                ID_User: document.getElementById('reg-id-auto').value,
                Nama_Lengkap: name,
                Jabatan: document.getElementById('reg-jabatan').value,
                Wilayah: document.getElementById('reg-wilayah').value,
                Password: pass,
                Foto_Profil: selectedPhoto,
                CreatedAt: new Date().toISOString()
            };

            try {
                // Simpan ke Private dan Public (Path All_Users sesuai gambar Anda)
                await setDoc(doc(db, 'artifacts', appId, 'users', userId, 'profile', 'data'), payload);
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'all_users', userId), payload);
                showToast("Pendaftaran Berhasil!");
                renderApp(payload);
            } catch (e) {
                showToast("Gagal mendaftar");
            }
        };

        // Auto ID Generation
        document.getElementById('reg-name').oninput = (e) => {
            const val = e.target.value.toUpperCase();
            if(val.length > 2) {
                const initials = val.split(' ').map(n => n[0]).join('').substring(0,3);
                document.getElementById('reg-id-auto').value = `PSDA-${initials}-${Math.floor(1000 + Math.random() * 9000)}`;
            }
        };

        // Photo Preview
        document.getElementById('photo-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                selectedPhoto = ev.target.result;
                document.getElementById('photo-preview').src = selectedPhoto;
                document.getElementById('photo-preview').classList.remove('hidden');
                document.getElementById('photo-placeholder').classList.add('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // Navigation
        document.getElementById('nav-home-btn').onclick = () => {
            document.getElementById('page-home').classList.remove('hidden');
            document.getElementById('page-admin').classList.add('hidden');
            document.getElementById('top-title').innerText = "Dashboard";
        };
        document.getElementById('nav-admin-btn').onclick = () => {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-admin').classList.remove('hidden');
            document.getElementById('top-title').innerText = "Database Pegawai";
        };

        document.getElementById('to-register').onclick = () => {
            document.getElementById('card-login').classList.remove('active');
            document.getElementById('card-register').classList.add('active');
        };
        document.getElementById('to-login').onclick = () => {
            document.getElementById('card-register').classList.remove('active');
            document.getElementById('card-login').classList.add('active');
        };

        // Sidebar Control
        document.getElementById('open-sidebar').onclick = () => document.getElementById('sidebar').classList.add('open');
        document.getElementById('close-sidebar').onclick = () => document.getElementById('sidebar').classList.remove('open');

        // Init Auth
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const snap = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data'));
                if (snap.exists()) renderApp(snap.data());
                else document.getElementById('page-auth').classList.remove('hidden');
            } else {
                await signInAnonymously(auth);
            }
            hideSplash();
            lucide.createIcons();
        });
    </script>
</body>
</html>
